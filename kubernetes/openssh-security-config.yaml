# SSH Security Configuration for CVE-2024-6387 Mitigation

apiVersion: v1
kind: ConfigMap
metadata:
  name: openssh-security-config
  namespace: webgoat
data:
  sshd_config: |
    # Disable Diffie-Hellman key exchange
    KexAlgorithms -diffie-hellman-group1-sha1,diffie-hellman-group14-sha1,diffie-hellman-group14-sha256,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
    
    # Require protocol 2
    Protocol 2
    
    # Disable legacy cipher modes
    Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
    
    # Disable vulnerable MAC algorithms
    MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256
    
    # Disable HostbasedAuthentication
    HostbasedAuthentication no
    
    # Prevent client from bypassing authentication
    PermitEmptyPasswords no
    
    # Disable challenge-response authentication
    ChallengeResponseAuthentication no
    
    # Restrict access to the server
    MaxAuthTries 3
    
    # Set proper permissions for key files
    StrictModes yes
    
    # Disable root login
    PermitRootLogin no
    
    # Set session timeouts
    ClientAliveInterval 300
    ClientAliveCountMax 2
    
    # Disable reverse DNS lookup
    UseDNS no
    
    # This is the critical setting for CVE-2024-6387 (RegreSSHion) vulnerability
    # It prevents client-initiated rekeying before authentication
    # which is the primary attack vector for this vulnerability
    MaxStartups 10:30:100
    
    # Set strict host key checking
    HostKeyAlgorithms ssh-ed25519,ssh-ed25519-cert-v01@openssh.com,sk-ssh-ed25519@openssh.com,sk-ssh-ed25519-cert-v01@openssh.com,rsa-sha2-512,rsa-sha2-512-cert-v01@openssh.com,rsa-sha2-256,rsa-sha2-256-cert-v01@openssh.com